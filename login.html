<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login - ProjuktiBari</title>
<style>
body{font-family:sans-serif;background:linear-gradient(135deg,#667eea,#764ba2);display:flex;justify-content:center;align-items:center;height:100vh;color:#fff;}
.box{background:rgba(255,255,255,0.15);padding:30px;border-radius:12px;text-align:center;}
input{padding:10px;width:200px;margin:10px;border:none;border-radius:6px;}
button{padding:10px 20px;border:none;border-radius:6px;cursor:pointer;}
</style>
</head>
<body>

<div class="box">
<h2>Login</h2>
<input id="email" placeholder="Email"><br>
<input id="pass" type="password" placeholder="Password"><br>
<button onclick="login()">Login</button>
<p id="msg"></p>
</div>

<script>
function login(){
  let e=document.getElementById("email").value;
  let p=document.getElementById("pass").value;

  if(e && p){
    localStorage.setItem("user","true");
    window.location.href="dashboard.html";
  }else{
    document.getElementById("msg").innerText="Enter valid info";
  }
}
</script>

</body>
</html>
