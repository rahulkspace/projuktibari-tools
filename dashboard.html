<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<style>
body{font-family:sans-serif;margin:0;background:#f4f6f9;}
header{background:#667eea;color:#fff;padding:15px;text-align:center;}
.container{padding:20px;}
.card{background:#fff;padding:20px;margin-bottom:15px;border-radius:10px;}
button{padding:8px 15px;}
</style>
</head>
<body>

<header>
<h2>Dashboard</h2>
<button onclick="logout()">Logout</button>
</header>

<div class="container">

<div class="card">
<h3>Welcome 👋</h3>
<p>Your tools are ready to use.</p>
</div>

<div class="card">
<h3>Go to Tools</h3>
<a href="index.html"><button>Open Tools</button></a>
</div>

<div class="card">
<h3>Pricing</h3>
<a href="pricing.html"><button>View Plans</button></a>
</div>

</div>

<script>
if(!localStorage.getItem("user")){
  window.location.href="login.html";
}

function logout(){
  localStorage.removeItem("user");
  window.location.href="login.html";
}
</script>

</body>
</html>
