<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ProjuktiBari Tools</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #f0f2f5;
}

header {
  background: #0d6efd;
  color: white;
  padding: 20px;
  text-align: center;
}

.container {
  max-width: 800px;
  margin: 30px auto;
}

.card {
  background: white;
  padding: 20px;
  margin-bottom: 20px;
  border-radius: 10px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

h2 {
  margin-top: 0;
}

textarea {
  width: 100%;
  height: 80px;
  padding: 10px;
  margin-top: 10px;
}

button {
  margin-top: 10px;
  padding: 10px 20px;
  background: #0d6efd;
  color: white;
  border: none;
  cursor: pointer;
  border-radius: 5px;
}

button:hover {
  background: #0b5ed7;
}
</style>
</head>

<body>

<header>
  <h1>ProjuktiBari Tools</h1>
  <p>Simple tools for digital marketers</p>
</header>

<div class="container">

  <div class="card">
    <h2>Facebook Caption Generator</h2>
    <textarea id="caption"></textarea>
    <button onclick="generateCaption()">Generate Caption</button>
  </div>

</div>

<script>
function generateCaption() {
  const captions = [
    "Boost your business today 🚀",
    "Limited time offer! Grab now 🔥",
    "Grow faster with smart marketing 💼",
    "Your success starts here 📈"
  ];
  document.getElementById("caption").value =
    captions[Math.floor(Math.random() * captions.length)];
}
</script>

</body>
</html>
