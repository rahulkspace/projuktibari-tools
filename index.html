<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ProjuktiBari Tools</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #f0f2f5;
}

header {
  background: #0d6efd;
  color: white;
  padding: 20px;
  text-align: center;
}

.container {
  max-width: 800px;
  margin: 30px auto;
}

.card {
  background: white;
  padding: 20px;
  margin-bottom: 20px;
  border-radius: 10px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

textarea, input {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
}

button {
  margin-top: 10px;
  padding: 10px 20px;
  background: #0d6efd;
  color: white;
  border: none;
  cursor: pointer;
  border-radius: 5px;
}

button:hover {
  background: #0b5ed7;
}
</style>
</head>

<body>

<header>
  <h1>ProjuktiBari Tools</h1>
  <p>Simple tools for digital marketers</p>
</header>

<div class="container">

  <!-- Caption -->
  <div class="card">
    <h2>Facebook Caption Generator</h2>
    <textarea id="caption"></textarea>
    <button onclick="generateCaption()">Generate Caption</button>
  </div>

  <!-- Hashtag -->
  <div class="card">
    <h2>Hashtag Generator</h2>
    <input type="text" id="keyword" placeholder="Enter keyword">
    <textarea id="hashtags"></textarea>
    <button onclick="generateHashtags()">Generate Hashtags</button>
  </div>

  <!-- Product Description -->
  <div class="card">
    <h2>Product Description Generator</h2>
    <input type="text" id="product" placeholder="Enter product name">
    <textarea id="description"></textarea>
    <button onclick="generateDescription()">Generate Description</button>
  </div>

</div>

<script>
function generateCaption() {
  const captions = [
    "Boost your business today 🚀",
    "Limited time offer! Grab now 🔥",
    "Grow faster with smart marketing 💼",
    "Your success starts here 📈"
  ];
  document.getElementById("caption").value =
    captions[Math.floor(Math.random() * captions.length)];
}

function generateHashtags() {
  let keyword = document.getElementById("keyword").value;
  let tags = `#${keyword} #marketing #business #growth #digital`;
  document.getElementById("hashtags").value = tags;
}

function generateDescription() {
  let product = document.getElementById("product").value;
  let desc = `${product} is a high-quality product designed to improve your daily life. Get the best value and performance today!`;
  document.getElementById("description").value = desc;
}
</script>

</body>
</html>
